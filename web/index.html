  <!-- iOS meta tags & icons -->

  <style id="splash-screen-style">
    #custom-splash-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      background-color: white;
      transition: opacity 0.5s ease-in-out;
    }
    
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }

    /* 웹폰트 미리 로드 */
    @font-face {
      font-family: 'Pretendard';
      src: url('assets/packages/app_ui/assets/fonts/Pretendard-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashScreen() {
      const splashContainer = document.getElementById("custom-splash-container");
      if (splashContainer) {
        splashContainer.style.opacity = "0";
        setTimeout(() => {
          splashContainer.remove();
        }, 500);
      }
    }
    
    // Expose the function to be called from Dart
    window.removeSplashScreen = removeSplashScreen;
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <div id="custom-splash-container">
    <iframe src="splash/splash.html" frameborder="0"></iframe>
  </div>
  
  <script src="flutter_bootstrap.js" async=""></script>

  </script>

</body></html>
