name: author_editor
description: "A new Flutter package project."
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.3.1 <4.0.0"
  flutter: ">=1.17.0"
  
dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  get: ^4.6.6
  flutter_inappwebview: ^6.1.5
  app_ui:
    path: ../app_ui
  common_assets:
    path: ../common_assets
  common_util:
    path: ../common_util
  app_localization:
    path: ../app_localization
  api:
    path: ../api
  web: ^1.1.0
  go_router: ^14.3.0
  provider: ^6.1.2
  table_calendar: ^3.0.9
  pointer_interceptor: ^0.10.1+2
  file_picker: ^8.1.4
  dio: ^5.7.0
  flutter_easyloading: ^3.0.5
  stomp_dart_client: ^2.1.3
  uuid: ^3.0.7
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  path: ^1.9.1
  html: ^0.15.6
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

