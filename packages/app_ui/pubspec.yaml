name: app_ui
description: "A new Flutter package project."
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.3.1 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  auto_size_text: ^3.0.0
  flutter_gen: 5.7.0
  flutter_svg: ^2.0.10+1
  pointer_interceptor: ^0.10.1+2
  get: ^4.6.6
  common_assets:
    path: ../common_assets
  table_calendar: ^3.1.2
  intl: ^0.19.0
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner:
  flutter_gen_runner:

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
  # fonts:
    # - family: Pretendard
    #   fonts:
    #     - asset: assets/fonts/Pretendard-Regular.woff
    #       weight: 400

flutter_gen:
  assets:
    enabled: true
    outputs:
      package_parameter_enabled: true
  output: lib/src/generated/
  line_length: 80

  integrations:
    flutter_svg: true
